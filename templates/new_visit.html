{% extends "base.html" %} {% block content %}

<div class="card shadow">
  <div class="card-header">
    <h3>New Visit</h3>
  </div>

  <div class="card-body">
    <h5>Patient: {{ patient.name }}</h5>

    <hr />

    <form method="POST">
      <div class="mb-3">
        <label>Reason</label>
        <textarea name="reason" class="form-control" required></textarea>
      </div>

      <div class="mb-3">
        <label>Diagnosis</label>
        <textarea name="diagnosis" class="form-control"></textarea>
      </div>

      <div class="mb-3">
        <label>Treatment</label>
        <textarea name="treatment" class="form-control"></textarea>
      </div>

      <div class="mb-3">
        <label>Prescription</label>
        <textarea name="prescription" class="form-control"></textarea>
      </div>
      <div class="mb-3">
        <label>Follow Up Date</label>

        <input type="date" name="follow_up_date" class="form-control" />
      </div>
      <div class="mb-3">
        <label>Notes</label>
        <textarea name="notes" class="form-control"></textarea>
      </div>

      <button class="btn btn-success">Save Visit</button>
    </form>
  </div>
</div>

{% endblock %}
