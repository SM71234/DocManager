{% extends "base.html" %}

{% block content %}

<div class="auth-container">

    <div class="auth-card">

        <div class="text-center mb-4">

            <img
                src="{{ url_for(
                    'static',
                    filename='images/healthcare.png'
                ) }}"
                width="80">

            <h2 class="mt-3">

                Welcome Back

            </h2>

            <p class="text-muted">

                Login to DocManager

            </p>

        </div>

        <form method="POST">

            <div class="mb-3">

                <label class="form-label">

                    Email Address

                </label>

                <input
                    type="email"
                    name="email"
                    class="form-control"
                    required>

            </div>

            <div class="mb-3">

                <label class="form-label">

                    Password

                </label>

                <input
                    type="password"
                    name="password"
                    class="form-control"
                    required>

            </div>

            <button
                class="btn btn-primary w-100">

                Login

            </button>

        </form>

        <hr>

        <div class="text-center">

            <span class="text-muted">

                New Doctor?

            </span>

            <a
                href="{{ url_for('register') }}"
                class="text-decoration-none fw-bold">

                Register Here

            </a>

        </div>

    </div>

</div>

{% endblock %}
