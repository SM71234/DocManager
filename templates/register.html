{% extends "base.html" %}

{% block content %}

<div class="auth-container">

    <div class="auth-card">

        <div class="text-center mb-4">

            <img
                src="{{ url_for(
                    'static',
                    filename='images/healthcare.png'
                ) }}"
                width="80">

            <h2 class="mt-3">

                Create Doctor Account

            </h2>

            <p class="text-muted">

                Register your clinic on DocManager

            </p>

        </div>

        <form method="POST">

            <div class="mb-3">

                <label class="form-label">

                    Doctor Name

                </label>

                <input
                    type="text"
                    name="name"
                    class="form-control"
                    required>

            </div>

            <div class="mb-3">

                <label class="form-label">

                    Clinic Name

                </label>

                <input
                    type="text"
                    name="clinic_name"
                    class="form-control"
                    required>

            </div>

            <div class="mb-3">

                <label class="form-label">

                    Email Address

                </label>

                <input
                    type="email"
                    name="email"
                    class="form-control"
                    required>

            </div>

            <div class="mb-3">

                <label class="form-label">

                    Phone Number

                </label>

                <input
                    type="text"
                    name="phone"
                    class="form-control"
                    required>

            </div>

            <div class="mb-4">

                <label class="form-label">

                    Password

                </label>

                <input
                    type="password"
                    name="password"
                    class="form-control"
                    required>

            </div>

            <button
                type="submit"
                class="btn btn-primary w-100">

                Create Account

            </button>

        </form>

        <hr>

        <div class="text-center">

            <span class="text-muted">

                Already have an account?

            </span>

            <a
                href="{{ url_for('login') }}"
                class="fw-bold text-decoration-none">

                Login Here

            </a>

        </div>

    </div>

</div>

{% endblock %}
