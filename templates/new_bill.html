{% extends "base.html" %}

{% block content %}

<div class="card shadow">

    <div class="card-header">

        <h3>

            Generate Bill

        </h3>

    </div>

    <div class="card-body">

        <h5>

            Patient:
            {{ patient.name }}

        </h5>

        <hr>

        <form method="POST">

            <div class="mb-3">

                <label class="form-label">

                    Consultation Fee

                </label>

                <input
                    type="number"
                    step="0.01"
                    name="consultation_fee"
                    class="form-control"
                    required>

            </div>

            <div class="mb-3">

                <label class="form-label">

                    Medicine Charges

                </label>

                <input
                    type="number"
                    step="0.01"
                    name="medicine_fee"
                    class="form-control"
                    value="0">

            </div>

            <div class="mb-3">

                <label class="form-label">

                    Procedure Charges

                </label>

                <input
                    type="number"
                    step="0.01"
                    name="procedure_fee"
                    class="form-control"
                    value="0">

            </div>

            <button
                type="submit"
                class="btn btn-primary">

                Generate Bill

            </button>

        </form>

    </div>

</div>

{% endblock %}
