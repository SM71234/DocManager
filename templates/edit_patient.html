{% extends "base.html" %}

{% block content %}

<div class="card shadow">

    <div class="card-header">

        <h3>Edit Patient</h3>

    </div>

    <div class="card-body">

        <form method="POST">

            <div class="mb-3">
                <label>Name</label>

                <input
                    type="text"
                    name="name"
                    class="form-control"
                    value="{{ patient.name }}"
                    required>
            </div>

            <div class="mb-3">
                <label>Phone</label>

                <input
                    type="text"
                    name="phone"
                    class="form-control"
                    value="{{ patient.phone }}"
                    required>
            </div>

            <div class="mb-3">
                <label>Age</label>

                <input
                    type="number"
                    name="age"
                    class="form-control"
                    value="{{ patient.age }}">
            </div>

            <div class="mb-3">
                <label>Gender</label>

                <select
                    name="gender"
                    class="form-control">

                    <option value="Male"
                        {% if patient.gender=="Male" %}
                        selected
                        {% endif %}>
                        Male
                    </option>

                    <option value="Female"
                        {% if patient.gender=="Female" %}
                        selected
                        {% endif %}>
                        Female
                    </option>

                    <option value="Other"
                        {% if patient.gender=="Other" %}
                        selected
                        {% endif %}>
                        Other
                    </option>

                </select>

            </div>

            <div class="mb-3">
                <label>Address</label>

                <textarea
                    name="address"
                    class="form-control">{{ patient.address }}</textarea>
            </div>

            <button
                class="btn btn-primary">

                Update Patient

            </button>

        </form>

    </div>

</div>

{% endblock %}
