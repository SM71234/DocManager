{% extends "base.html" %}

{% block content %}

<div class="card shadow">

    <div class="card-header">

        <h3>

            Invoice

        </h3>

    </div>

    <div class="card-body">

        <h5>

            Patient:
            {{ patient.name }}

        </h5>

        <hr>

        <table class="table">

            <tr>
                <th>Consultation Fee</th>
                <td>₹{{ bill.consultation_fee }}</td>
            </tr>

            <tr>
                <th>Medicine Charges</th>
                <td>₹{{ bill.medicine_fee }}</td>
            </tr>

            <tr>
                <th>Procedure Charges</th>
                <td>₹{{ bill.procedure_fee }}</td>
            </tr>

            <tr class="table-success">

                <th>Total</th>

                <th>
                    ₹{{ bill.total_amount }}
                </th>
                
            </tr>
            <a
                href="{{ url_for(
                    'bill_pdf',
                    bill_id=bill.id
                ) }}"
                class="btn btn-success">

                Download PDF

            </a>

        </table>

    </div>

</div>

{% endblock %}
