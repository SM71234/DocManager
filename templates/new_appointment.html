{% extends "base.html" %}

{% block content %}

<div class="card shadow">

    <div class="card-header">

        <h4>New Appointment</h4>

    </div>

    <div class="card-body">

        <form method="POST">

            <div class="mb-3">

                <label class="form-label">

                    Patient

                </label>

                <select
                    name="patient_id"
                    class="form-select"
                    required>

                    <option value="">
                        Select Patient
                    </option>

                    {% for patient in patients %}

                    <option value="{{ patient.id }}">

                        {{ patient.name }}

                    </option>

                    {% endfor %}

                </select>

            </div>

            <div class="mb-3">

                <label class="form-label">

                    Appointment Date

                </label>

                <input
                    type="date"
                    name="appointment_date"
                    class="form-control"
                    required>

            </div>

            <div class="mb-3">

                <label class="form-label">

                    Appointment Time

                </label>

                <input
                    type="time"
                    name="appointment_time"
                    class="form-control"
                    required>

            </div>

            <div class="mb-3">

                <label class="form-label">

                    Notes

                </label>

                <textarea
                    name="notes"
                    class="form-control"></textarea>

            </div>

            <button
                type="submit"
                class="btn btn-primary">

                Save Appointment

            </button>

        </form>

    </div>

</div>

{% endblock %}
