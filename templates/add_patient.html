{% extends "base.html" %}

{% block content %}

<div class="card shadow">

    <div class="card-header">
        <h3>Add Patient</h3>
    </div>

    <div class="card-body">

        <form method="POST">

            <div class="mb-3">
                <label>Full Name</label>
                <input type="text"
                       name="name"
                       class="form-control"
                       required>
            </div>

            <div class="mb-3">
                <label>Phone Number</label>
                <input type="text"
                       name="phone"
                       class="form-control"
                       required>
            </div>

            <div class="mb-3">
                <label>Age</label>
                <input type="number"
                       name="age"
                       class="form-control">
            </div>

            <div class="mb-3">
                <label>Gender</label>
                <select name="gender"
                        class="form-control">

                    <option value="">Select</option>
                    <option>Male</option>
                    <option>Female</option>
                    <option>Other</option>

                </select>
            </div>

            <div class="mb-3">
                <label>Address</label>
                <textarea name="address"
                          class="form-control">
                </textarea>
            </div>

            <button
                class="btn btn-primary">
                Save Patient
            </button>

        </form>

    </div>

</div>

{% endblock %}
