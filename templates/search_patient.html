{% extends "base.html" %} {% block content %}

<div class="card shadow">
  <div class="card-header">
    <h3>Search Patients</h3>
  </div>

  <div class="card-body">
    <form method="GET">
      <div class="input-group">
        <input
          type="text"
          name="query"
          class="form-control"
          placeholder="Search by name or phone"
          value="{{ query }}"
        />

        <button class="btn btn-primary">Search</button>
      </div>
    </form>

    <hr />

    {% if patients %}

    <table class="table">

    <thead>
        <tr>
            <th>Patient ID</th>
            <th>Name</th>
            <th>Phone</th>
            <th>Action</th>
        </tr>
    </thead>

    <tbody>

        {% for patient in patients %}

        <tr>

            <td>
                {{ patient.patient_code }}
            </td>

            <td>
                {{ patient.name }}
            </td>

            <td>
                {{ patient.phone }}
            </td>

            <td>

                <a href="{{ url_for(
                    'patient_profile',
                    patient_id=patient.id
                ) }}">
                    View
                </a>

            </td>

        </tr>

        {% endfor %}

    </tbody>

</table>

    {% elif query %}

    <div class="alert alert-warning">No patients found.</div>

    {% endif %}
  </div>
</div>

{% endblock %}
