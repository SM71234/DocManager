{% extends "base.html" %}

{% block content %}

<div class="card shadow-sm">

    <div class="card-header">

        <h4 class="mb-0">

            Doctor Profile & Settings

        </h4>

    </div>

    <div class="card-body">

        <form
            method="POST"
            enctype="multipart/form-data">

            <div class="row">

                <div class="col-md-6 mb-3">

                    <label class="form-label">

                        Doctor Name

                    </label>

                    <input
                        type="text"
                        name="name"
                        class="form-control"
                        value="{{ current_user.name }}"
                        required>

                </div>

                <div class="col-md-6 mb-3">

                    <label class="form-label">

                        Qualification

                    </label>

                    <input
                        type="text"
                        name="qualification"
                        class="form-control"
                        value="{{ current_user.qualification or '' }}"
                        placeholder="MBBS, BAMS, BHMS">

                </div>

            </div>

            <div class="mb-3">

                <label class="form-label">

                    Clinic Name

                </label>

                <input
                    type="text"
                    name="clinic_name"
                    class="form-control"
                    value="{{ current_user.clinic_name }}"
                    required>

            </div>

            <div class="mb-3">

                <label class="form-label">

                    Clinic Address

                </label>

                <textarea
                    name="clinic_address"
                    class="form-control"
                    rows="3">{{ current_user.clinic_address or '' }}</textarea>

            </div>

            <div class="row">

                <div class="col-md-6 mb-3">

                    <label class="form-label">

                        Phone Number

                    </label>

                    <input
                        type="text"
                        name="phone"
                        class="form-control"
                        value="{{ current_user.phone }}"
                        required>

                </div>

                <div class="col-md-6 mb-3">

                    <label class="form-label">

                        Email

                    </label>

                    <input
                        type="email"
                        name="email"
                        class="form-control"
                        value="{{ current_user.email }}"
                        required>

                </div>

            </div>

            <div class="mb-3">

                <label class="form-label">

                    Clinic Logo

                </label>

                <input
                    type="file"
                    name="logo"
                    class="form-control">

            </div>

            {% if current_user.logo %}

            <div class="mb-4">

                <label class="form-label">

                    Current Logo
                    <p>{{ current_user.logo }}</p>
                </label>
                
                <br>

                <img
                    src="{{ url_for(
                        'static',
                        filename='uploads/' + current_user.logo
                    ) }}"
                    width="150"
                    class="rounded shadow">

            </div>

            {% endif %}

            <button
                type="submit"
                class="btn btn-primary">

                Save Settings

            </button>

        </form>

    </div>

</div>

{% endblock %}
